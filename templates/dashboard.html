<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Devin Ticket Dashboard</title>
<style>
  :root { --bg: #0f1117; --card: #1a1d27; --border: #2a2d37; --text: #e1e4eb;
          --muted: #8b8fa3; --green: #22c55e; --red: #ef4444; --blue: #3b82f6;
          --yellow: #eab308; --purple: #a855f7; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
         sans-serif; background: var(--bg); color: var(--text); padding: 24px; }
  .header { display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 20px; }
  h1 { font-size: 1.5rem; }
  .stats { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 24px; }
  .stat-card { background: var(--card); border: 1px solid var(--border);
               border-radius: 10px; padding: 20px 24px; min-width: 160px;
               flex: 1; }
  .stat-card .label { color: var(--muted); font-size: 0.8rem;
                      text-transform: uppercase; letter-spacing: 0.05em; }
  .stat-card .value { font-size: 2rem; font-weight: 700; margin-top: 4px; }
  .stat-card .value.green  { color: var(--green); }
  .stat-card .value.red    { color: var(--red); }
  .stat-card .value.blue   { color: var(--blue); }
  .stat-card .value.yellow { color: var(--yellow); }
  table { width: 100%; border-collapse: collapse; background: var(--card);
          border: 1px solid var(--border); border-radius: 10px;
          overflow: hidden; }
  th, td { text-align: left; padding: 12px 16px; border-bottom: 1px solid
           var(--border); font-size: 0.875rem; }
  th { color: var(--muted); font-weight: 600; text-transform: uppercase;
       font-size: 0.75rem; letter-spacing: 0.05em; }
  tr:last-child td { border-bottom: none; }
  .badge { display: inline-block; padding: 2px 10px; border-radius: 9999px;
           font-size: 0.75rem; font-weight: 600; }
  .badge.active   { background: rgba(59,130,246,0.15); color: var(--blue); }
  .badge.completed{ background: rgba(34,197,94,0.15);  color: var(--green); }
  .badge.failed   { background: rgba(239,68,68,0.15);  color: var(--red); }
  .badge.blocked  { background: rgba(234,179,8,0.15);  color: var(--yellow); }
  a { color: var(--blue); text-decoration: none; }
  a:hover { text-decoration: underline; }
  .empty { text-align: center; padding: 48px; color: var(--muted); }
  .refresh { color: var(--muted); font-size: 0.8rem; margin-bottom: 16px; }

  /* Create ticket button */
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px;
         border: none; border-radius: 8px; font-size: 0.875rem; font-weight: 600;
         cursor: pointer; transition: background 0.15s; }
  .btn-primary { background: var(--blue); color: #fff; }
  .btn-primary:hover { background: #2563eb; }
  .btn-secondary { background: var(--border); color: var(--text); }
  .btn-secondary:hover { background: #3a3d47; }

  /* Modal */
  .modal-overlay { display: none; position: fixed; inset: 0;
                   background: rgba(0,0,0,0.6); z-index: 100;
                   align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--card); border: 1px solid var(--border);
           border-radius: 12px; padding: 28px; width: 480px; max-width: 95vw; }
  .modal h2 { font-size: 1.2rem; margin-bottom: 20px; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; color: var(--muted); font-size: 0.8rem;
                      text-transform: uppercase; letter-spacing: 0.05em;
                      margin-bottom: 6px; }
  .form-group input, .form-group textarea {
    width: 100%; padding: 10px 12px; background: var(--bg);
    border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); font-size: 0.875rem; font-family: inherit;
    outline: none; transition: border-color 0.15s; }
  .form-group input:focus, .form-group textarea:focus {
    border-color: var(--blue); }
  .form-group textarea { resize: vertical; min-height: 80px; }
  .modal-actions { display: flex; gap: 12px; justify-content: flex-end;
                   margin-top: 20px; }
  .form-error { color: var(--red); font-size: 0.8rem; margin-top: 6px;
                display: none; }

  /* Toast notifications */
  .toast-container { position: fixed; top: 20px; right: 20px; z-index: 200;
                     display: flex; flex-direction: column; gap: 8px;
                     max-width: 380px; }
  .toast { padding: 14px 18px; border-radius: 10px; font-size: 0.85rem;
           animation: slideIn 0.3s ease; border: 1px solid;
           display: flex; align-items: flex-start; gap: 10px; }
  .toast .toast-close { background: none; border: none; color: inherit;
                        cursor: pointer; font-size: 1.1rem; padding: 0;
                        line-height: 1; opacity: 0.6; flex-shrink: 0; }
  .toast .toast-close:hover { opacity: 1; }
  .toast .toast-body { flex: 1; }
  .toast .toast-title { font-weight: 600; margin-bottom: 2px; }
  .toast.success { background: rgba(34,197,94,0.12); border-color: rgba(34,197,94,0.3);
                   color: var(--green); }
  .toast.error   { background: rgba(239,68,68,0.12); border-color: rgba(239,68,68,0.3);
                   color: var(--red); }
  .toast.warning { background: rgba(234,179,8,0.12); border-color: rgba(234,179,8,0.3);
                   color: var(--yellow); }
  .toast.info    { background: rgba(59,130,246,0.12); border-color: rgba(59,130,246,0.3);
                   color: var(--blue); }
  @keyframes slideIn { from { transform: translateX(100%); opacity: 0; }
                       to   { transform: translateX(0);    opacity: 1; } }

  /* Expandable detail row */
  .expand-btn { background: none; border: none; color: var(--muted); cursor: pointer;
                font-size: 0.9rem; padding: 4px 8px; transition: transform 0.2s;
                line-height: 1; }
  .expand-btn:hover { color: var(--text); }
  .expand-btn.open { transform: rotate(90deg); }
  .detail-row { display: none; }
  .detail-row.open { display: table-row; }
  .detail-cell { padding: 4px 16px 20px; }
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px;
                 padding: 16px; background: var(--bg); border-radius: 8px;
                 border: 1px solid var(--border); }
  .detail-section h3 { font-size: 0.8rem; color: var(--muted); text-transform: uppercase;
                       letter-spacing: 0.05em; margin-bottom: 12px; }
  .progress-list { list-style: none; padding: 0; margin: 0; }
  .progress-item { display: flex; align-items: flex-start; gap: 10px; padding: 6px 0;
                   font-size: 0.85rem; }
  .progress-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
                  margin-top: 5px; }
  .progress-dot.done { background: var(--green); }
  .progress-dot.current { background: var(--blue); box-shadow: 0 0 6px var(--blue); }
  .report-part { margin-bottom: 14px; }
  .report-label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase;
                  letter-spacing: 0.05em; margin-bottom: 4px; }
  .report-text { font-size: 0.85rem; line-height: 1.5; }
  .no-data { color: var(--muted); font-size: 0.85rem; font-style: italic; }
</style>
</head>
<body>

<!-- Toast container -->
<div class="toast-container" id="toasts"></div>

<!-- Header -->
<div class="header">
  <h1>Devin Ticket Dashboard</h1>
  <button class="btn btn-primary" onclick="openModal()">
    + New Ticket
  </button>
</div>
<div class="refresh">Auto-refreshes every 10 s</div>

<!-- Stats -->
<div class="stats" id="stats"></div>

<!-- Ticket table -->
<table>
  <thead>
    <tr>
      <th style="width:36px"></th><th>Ticket</th><th>Title</th><th>Status</th><th>Elapsed</th>
      <th>Session</th><th>PR</th><th>Created</th>
    </tr>
  </thead>
  <tbody id="rows"><tr><td colspan="8" class="empty">Loading…</td></tr></tbody>
</table>

<!-- Create-ticket modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2>Create Ticket</h2>
    <form id="ticketForm" onsubmit="return submitTicket(event)">
      <div class="form-group">
        <label for="tid">Ticket ID *</label>
        <input id="tid" name="id" required placeholder="e.g. PROJ-123" />
      </div>
      <div class="form-group">
        <label for="ttitle">Title *</label>
        <input id="ttitle" name="title" required placeholder="Short summary" />
      </div>
      <div class="form-group">
        <label for="tdesc">Description</label>
        <textarea id="tdesc" name="description"
                  placeholder="Detailed description (optional)"></textarea>
      </div>
      <div class="form-group">
        <label for="turl">Ticket URL</label>
        <input id="turl" name="url" type="url"
               placeholder="https://...  (optional)" />
      </div>
      <div class="form-error" id="formError"></div>
      <div class="modal-actions">
        <button type="button" class="btn btn-secondary"
                onclick="closeModal()">Cancel</button>
        <button type="submit" class="btn btn-primary"
                id="submitBtn">Create</button>
      </div>
    </form>
  </div>
</div>

<script>
/* ---- Modal ---- */
function openModal()  { document.getElementById('modal').classList.add('open'); }
function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.getElementById('ticketForm').reset();
  document.getElementById('formError').style.display = 'none';
}
document.getElementById('modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

async function submitTicket(e) {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  const errEl = document.getElementById('formError');
  errEl.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'Creating...';

  const form = document.getElementById('ticketForm');
  const body = {
    id: form.id.value.trim(),
    title: form.title.value.trim(),
    description: form.description.value.trim(),
    url: form.url.value.trim(),
  };

  try {
    const res = await fetch('/webhook/ticket', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!res.ok) {
      const detail = await res.json().catch(() => ({}));
      throw new Error(detail.detail || `Server returned ${res.status}`);
    }
    const data = await res.json();
    closeModal();
    showToast('info', 'Ticket created',
      `#${body.id} — Devin session started`);
    load();
  } catch (err) {
    errEl.textContent = err.message;
    errEl.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Create';
  }
  return false;
}

/* ---- Expandable detail rows ---- */
let openDetailSid = null;

function toggleDetail(sid, btn) {
  const dr = document.getElementById('detail-' + sid);
  if (!dr) return;
  const wasOpen = dr.classList.contains('open');
  document.querySelectorAll('.detail-row.open').forEach(r => r.classList.remove('open'));
  document.querySelectorAll('.expand-btn.open').forEach(b => b.classList.remove('open'));
  openDetailSid = null;
  if (!wasOpen) {
    dr.classList.add('open');
    btn.classList.add('open');
    openDetailSid = sid;
    fetchDetail(sid);
  }
}

async function fetchDetail(sid) {
  const el = document.getElementById('detail-content-' + sid);
  if (!el) return;
  try {
    const res = await fetch('/api/tickets/' + sid + '/details');
    const data = await res.json();
    renderDetail(sid, data);
  } catch (e) {
    el.innerHTML = '<div class="no-data">Failed to load details</div>';
  }
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

function renderDetail(sid, data) {
  const el = document.getElementById('detail-content-' + sid);
  if (!el) return;
  const so = data.progress || {};
  const completed = so.completed_tasks || [];
  const current = so.current_task || '';
  let report = data.report || so.report || {};
  if (typeof report === 'string') {
    try { report = JSON.parse(report); } catch(e) { report = {text: report}; }
  }

  let html = '<div class="detail-grid">';

  // Progress section
  html += '<div class="detail-section"><h3>Progress</h3>';
  if (completed.length || current) {
    html += '<div class="progress-list">';
    for (const task of completed) {
      html += '<div class="progress-item"><span class="progress-dot done"></span>' + escHtml(task) + '</div>';
    }
    if (current) {
      html += '<div class="progress-item"><span class="progress-dot current"></span>' + escHtml(current) + '</div>';
    }
    html += '</div>';
  } else {
    html += '<div class="no-data">No progress updates yet</div>';
  }
  html += '</div>';

  // Report section
  html += '<div class="detail-section"><h3>Report</h3>';
  const hasReport = typeof report === 'object' && report !== null &&
    (report.what_solved || report.how_we_did_it || report.concrete_results);
  if (hasReport) {
    if (report.what_solved) {
      html += '<div class="report-part"><div class="report-label">What we solved</div>';
      html += '<div class="report-text">' + escHtml(report.what_solved) + '</div></div>';
    }
    if (report.how_we_did_it) {
      html += '<div class="report-part"><div class="report-label">How we did it</div>';
      html += '<div class="report-text">' + escHtml(report.how_we_did_it) + '</div></div>';
    }
    if (report.concrete_results) {
      html += '<div class="report-part"><div class="report-label">Concrete results</div>';
      html += '<div class="report-text">' + escHtml(report.concrete_results) + '</div></div>';
    }
  } else if (report && report.text) {
    html += '<div class="report-text">' + escHtml(report.text) + '</div>';
  } else {
    html += '<div class="no-data">No report available yet</div>';
  }
  html += '</div>';

  html += '</div>';
  el.innerHTML = html;
}

/* ---- Toasts ---- */
function showToast(level, title, msg) {
  const container = document.getElementById('toasts');
  const el = document.createElement('div');
  el.className = `toast ${level}`;
  el.innerHTML = `<div class="toast-body">
    <div class="toast-title">${title}</div>
    <div>${msg}</div>
  </div>
  <button class="toast-close" onclick="this.parentElement.remove()">&times;</button>`;
  container.appendChild(el);
  setTimeout(() => el.remove(), 8000);
}

/* ---- Notification polling ---- */
let lastNotifTs = '';
async function pollNotifications() {
  try {
    const url = lastNotifTs
      ? `/api/notifications?since=${encodeURIComponent(lastNotifTs)}`
      : '/api/notifications';
    const res = await fetch(url);
    const items = await res.json();
    for (const n of items) {
      showToast(n.level, `#${n.ticket_id} ${n.title}`, n.message);
      lastNotifTs = n.timestamp;
    }
  } catch (e) { /* ignore */ }
}

/* ---- Ticket table ---- */
async function load() {
  const res = await fetch('/api/tickets');
  const tickets = await res.json();

  const total = tickets.length;
  const active = tickets.filter(t => t.status === 'active').length;
  const completed = tickets.filter(t => t.status === 'completed').length;
  const failed = tickets.filter(t => t.status === 'failed').length;
  const blocked = tickets.filter(t => t.status === 'blocked').length;

  document.getElementById('stats').innerHTML = `
    <div class="stat-card"><div class="label">Total</div>
      <div class="value">${total}</div></div>
    <div class="stat-card"><div class="label">Active</div>
      <div class="value blue">${active}</div></div>
    <div class="stat-card"><div class="label">Completed</div>
      <div class="value green">${completed}</div></div>
    <div class="stat-card"><div class="label">Failed</div>
      <div class="value red">${failed}</div></div>
    <div class="stat-card"><div class="label">Blocked</div>
      <div class="value yellow">${blocked}</div></div>
  `;

  const tbody = document.getElementById('rows');
  if (!tickets.length) {
    tbody.innerHTML = '<tr><td colspan="8" class="empty">No tickets yet</td></tr>';
    return;
  }
  tbody.innerHTML = tickets.map(t => `<tr>
    <td><button class="expand-btn" data-sid="${t.session_id}" onclick="toggleDetail('${t.session_id}',this)">&#9654;</button></td>
    <td>${t.ticket_url ? '<a href="'+t.ticket_url+'">#'+t.ticket_id+'</a>' : '#'+t.ticket_id}</td>
    <td>${t.title}</td>
    <td><span class="badge ${t.status}">${t.status}</span></td>
    <td>${t.elapsed_minutes} min</td>
    <td><a href="${t.session_url}" target="_blank">View</a></td>
    <td>${t.pr_url ? '<a href="'+t.pr_url+'" target="_blank">PR</a>' : '—'}</td>
    <td>${t.created_at ? new Date(t.created_at).toLocaleString() : '—'}</td>
  </tr>
  <tr class="detail-row" id="detail-${t.session_id}">
    <td colspan="8" class="detail-cell">
      <div id="detail-content-${t.session_id}"><div class="no-data">Loading details…</div></div>
    </td>
  </tr>`).join('');

  // Re-open detail row if it was open before refresh
  if (openDetailSid) {
    const dr = document.getElementById('detail-' + openDetailSid);
    const btn = document.querySelector('.expand-btn[data-sid="'+openDetailSid+'"]');
    if (dr && btn) {
      dr.classList.add('open');
      btn.classList.add('open');
      fetchDetail(openDetailSid);
    } else {
      openDetailSid = null;
    }
  }
}
load();
setInterval(load, 10000);
setInterval(pollNotifications, 10000);
</script>
</body>
</html>
